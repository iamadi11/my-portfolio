<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="128" fill="#09090b"/>
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)"/>
  <rect x="1" y="1" width="510" height="510" rx="127" stroke="url(#border-grad)" stroke-width="2"/>

  <!-- Subtle cyan radial glow -->
  <radial-gradient id="glow" cx="256" cy="200" r="220" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="rgba(34,211,238,0.12)"/>
    <stop offset="100%" stop-color="transparent"/>
  </radial-gradient>

  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(34,211,238,0.06)"/>
      <stop offset="100%" stop-color="rgba(139,92,246,0.04)"/>
    </linearGradient>
    <linearGradient id="border-grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(34,211,238,0.4)"/>
      <stop offset="50%" stop-color="rgba(139,92,246,0.25)"/>
      <stop offset="100%" stop-color="rgba(34,211,238,0.15)"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="120" y1="160" x2="392" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Glow circle behind text -->
  <ellipse cx="256" cy="268" rx="180" ry="120" fill="rgba(34,211,238,0.05)"/>

  <!-- AR monogram -->
  <text
    x="256"
    y="330"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-weight="800"
    font-size="240"
    letter-spacing="-8"
    fill="url(#text-grad)"
  >AR</text>
</svg>
